name: Build SGX Poster

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      base_image:
        description: "Docker image to use for SGX poster"
        required: false
        type: string
  workflow_call:
    inputs:
      base_image:
        description: "Docker image to use for SGX poster"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ (github.ref == 'refs/heads/master' && github.run_number) || github.ref }}
  cancel-in-progress: true

run-name: Build SGX Poster - ${{ inputs.base_image || 'Simple Build' }}

jobs:
  sgx-poster:
    runs-on: ubuntu-24.04
    steps:
      - name: Save Base Image and Tag
        run: |
          BASE_IMAGE="${{ inputs.base_image || 'ghcr.io/espressosystems/nitro-espresso-integration/nitro-node:v3.3.2-celestia-5ed9cd8' }}"
          BASE_TAG="${BASE_IMAGE##*:}"
          echo "BASE_IMAGE=${BASE_IMAGE}" >> ${GITHUB_ENV}
          echo "BASE_TAG=${BASE_TAG}" >> ${GITHUB_ENV}

      - name: Checkout Repository
        uses: actions/checkout@v4

      # Seems to break the build. Figure this out later.
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Setup Docker BuildKit (buildx)
        uses: docker/setup-buildx-action@v3

      - name: Login to Github Container Repo
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker
        uses: docker/build-push-action@v5
        with:
          context: ./config
          file: ./config/Dockerfile.sgx-poster
          platforms: linux/amd64
          load: true
          push: false
          tags: sgx-poster:latest
          build-args: |
            BASE_IMAGE=${{ env.BASE_IMAGE }}

      - name: Install tools needed for gsc
        run: sudo apt-get install -y python3 python3-docker python3-jinja2 python3-pip python3-tomli python3-tomli-w python3-yaml

      - name: Move config into place
        run: cp config.yaml.template config.yaml

      - name: Run gsc build
        run: ./gsc build sgx-poster ./nitro-espresso.manifest

      - name: Sign Image
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GSC_SIGNING_KEY }}" > enclave-key.pem
          ./gsc sign-image sgx-poster enclave-key.pem
          rm enclave-key.pem

      - name: Extract Enclave Info
        if: github.event_name != 'pull_request'
        run: |
          ./gsc info-image gsc-sgx-poster | python3 -c "
          import sys, tomllib, os
          d = tomllib.loads(sys.stdin.read())
          open(os.environ['GITHUB_ENV'], 'a').write(
              'MR_ENCLAVE=' + d['mr_enclave'] + '\n' +
              'MR_SIGNER=' + d['mr_signer'] + '\n' +
              'SIGN_DATE=' + d['date'] + '\n' +
              'IS_DEBUG=' + str(d['debug']).lower() + '\n'
          )
          open(os.environ['GITHUB_STEP_SUMMARY'], 'a').write(
              '## SGX Enclave Info\n\n| Field | Value |\n| --- | --- |\n' +
              '| MRENCLAVE | \`' + d['mr_enclave'] + '\` |\n' +
              '| MRSIGNER | \`' + d['mr_signer'] + '\` |\n' +
              '| Sign Date | ' + d['date'] + ' |\n' +
              '| Debug | ' + str(d['debug']).lower() + ' |\n'
          )
          "

      - name: Tag and Push Docker
        if: github.event_name != 'pull_request'
        run: |
          printf 'FROM gsc-sgx-poster\n' | docker build \
            --label "sgx.mrenclave=${{ env.MR_ENCLAVE }}" \
            --label "sgx.mrsigner=${{ env.MR_SIGNER }}" \
            --label "sgx.sign_date=${{ env.SIGN_DATE }}" \
            --label "sgx.debug=${{ env.IS_DEBUG }}" \
            --label "base.image=${{ env.BASE_IMAGE }}" \
            --label "base.tag=${{ env.BASE_TAG }}" \
            -t ghcr.io/espressosystems/gsc-sgx-poster:${{ env.BASE_TAG }} \
            -
          docker push ghcr.io/espressosystems/gsc-sgx-poster:${{ env.BASE_TAG }}
